<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreshCart Grocery</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>FreshCart Grocery</h1>
      <p>Browse products, filter quickly, and check out with transparent pricing.</p>
    </header>

    <section class="card controls-card">
      <h2>Find Products</h2>
      <div class="controls-grid">
        <label>
          Search
          <input id="search-input" type="search" placeholder="Search products..." />
        </label>
        <label>
          Category
          <select id="category-filter">
            <option value="all">All categories</option>
          </select>
        </label>
        <label class="toggle-label">
          <input id="stock-toggle" type="checkbox" />
          In-stock only
        </label>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Store</h2>
        <p id="results-count" class="muted"></p>
      </div>
      <p id="empty-state" class="muted hidden">No products match your filters.</p>
      <ul id="product-list" class="product-list"></ul>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Cart</h2>
        <button id="clear-cart" class="danger">Clear Cart</button>
      </div>
      <p id="empty-cart" class="muted">Your cart is empty.</p>
      <ul id="cart-list" class="cart-list"></ul>

      <div class="promo-row">
        <label>
          Promo code
          <input id="promo-input" type="text" placeholder="SAVE10 or WELCOME5" />
        </label>
        <button id="apply-promo">Apply</button>
        <button id="remove-promo" class="ghost">Remove</button>
      </div>
      <p id="promo-message" class="muted"></p>

      <div class="totals">
        <p>Subtotal <strong id="subtotal-value">$0.00</strong></p>
        <p>Discount <strong id="discount-value">-$0.00</strong></p>
        <p>Delivery <strong id="delivery-value">$0.00</strong></p>
        <p class="total-row">Total <strong id="total-value">$0.00</strong></p>
        <p id="delivery-note" class="muted"></p>
      </div>

      <button id="checkout-btn" class="checkout-btn">Proceed to Checkout</button>
    </section>
  </main>

  <template id="product-item-template">
    <li class="product-item">
      <div>
        <h3 class="name"></h3>
        <p class="meta muted"></p>
        <p class="price"></p>
      </div>
      <button class="add-btn">Add to cart</button>
    </li>
  </template>

  <template id="cart-item-template">
    <li class="cart-item">
      <div>
        <h3 class="name"></h3>
        <p class="line-price muted"></p>
      </div>
      <div class="qty-actions">
        <button class="decrease ghost">−</button>
        <span class="qty"></span>
        <button class="increase">+</button>
      </div>
    </li>
  </template>

  <script src="script.js"></script>
</body>
</html>
