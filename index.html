<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grocery Cart</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>Grocery Shopping</h1>
        <p>Select a store, add items to your cart, and check out.</p>
      </header>

      <section class="panel">
        <h2>Stores</h2>
        <ul id="store-list" class="store-list" aria-label="Store list"></ul>
      </section>

      <section class="panel">
        <h2 id="products-title">Products</h2>
        <ul id="product-list" class="product-list" aria-label="Product list"></ul>
      </section>

      <section class="panel">
        <h2>Cart</h2>
        <ul id="cart-list" class="cart-list" aria-label="Cart items"></ul>
        <p id="cart-empty" class="muted">Your cart is empty.</p>

        <div class="cart-summary">
          <p>Items: <strong id="cart-count">0</strong></p>
          <p>Total: <strong id="cart-total">$0.00</strong></p>
        </div>
      </section>

      <section class="panel">
        <h2>Checkout</h2>
        <form id="checkout-form" class="checkout-form" novalidate>
          <label>
            Name
            <input type="text" id="checkout-name" name="name" autocomplete="name" required />
          </label>

          <label>
            Email
            <input type="email" id="checkout-email" name="email" autocomplete="email" required />
          </label>

          <label>
            Address
            <textarea id="checkout-address" name="address" rows="3" autocomplete="street-address" required></textarea>
          </label>

          <button type="submit">Place Order</button>
          <p id="checkout-message" class="checkout-message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
